query DaoByAddressWithAssignments(
  $address: String!
  $daoAccountsOrderBy: [AccountsOrderBy!]
  # Set to Boolean (optional) and default to true
  $includePrivate: Boolean = true
) {
  daoByAddress(address: $address) {
    address
    daoRbamAddress
    cw4GroupAddress
    accountsByAssignmentDaoAddressAndAccountId(orderBy: $daoAccountsOrderBy) {
      nodes {
        id
        name
        type
        image
        addr
        title
        privateAccountById @include(if: $includePrivate) {
          email
          googleEmail
        }
      }
    }
    assignmentsByDaoAddress {
      nodes {
        roleName
        onChainRoleId
        visible
        accountId
      }
    }
  }
}

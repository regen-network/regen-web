query AccountById($id: UUID!, $daoAccountsOrderBy: [AccountsOrderBy!]) {
  accountById(id: $id) {
    id
    name
    type
    image
    bgImage
    description
    websiteLink
    twitterLink
    addr
    nonce
    custodialAddress
    stripeConnectedAccountId
    accountTranslationsById {
      nodes {
        languageCode
        description
      }
    }
    fiatOrdersByAccountId(orderBy: CREATED_AT_DESC) {
      nodes {
        createdAt
        txHash
        stripePaymentIntentId
        retiredCredits
        totalPrice
        askDenom
        creditsAmount
        projectOnChainId
        customerName
        anonymous
      }
    }
    daosByAssignmentAccountIdAndDaoAddress {
      nodes {
        address
        daoRbamAddress
        cw4GroupAddress
        organizationByDaoAddress {
          id
          name
          description
          image
          bgImage
          websiteLink
          twitterLink
        }
        projectByAdminDaoAddress {
          id
        }
        accountsByAssignmentDaoAddressAndAccountId(
          orderBy: $daoAccountsOrderBy
        ) {
          nodes {
            id
            name
            type
            image
            addr
            title
            privateAccountById {
              email
              googleEmail
            }
          }
        }
        assignmentsByDaoAddress {
          nodes {
            roleName
            onChainRoleId
            visible
            accountId
          }
        }
      }
    }
  }
}

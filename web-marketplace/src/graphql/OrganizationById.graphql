query OrganizationById($id: String!) {
  organizationById(id: $id) {
    organizationProjectsByOrganizationId {
      nodes {
        projectByProjectId {
          adminDaoAddress
          daoByAdminDaoAddress {
            daoRbamAddress
            cw4GroupAddress
            assignmentsByDaoAddress {
              nodes {
                accountId
                accountByAccountId {
                  addr
                  privateAccountById {
                    email
                    googleEmail
                  }
                }
                roleName
                onChainRoleId
              }
            }
          }
        }
      }
    }
  }
}

query AccountById($id: UUID!) {
  accountById(id: $id) {
    id
    name
    type
    image
    bgImage
    description
    websiteLink
    twitterLink
    addr
    nonce
    custodialAddress
    stripeConnectedAccountId
    title
    accountTranslationsById {
      nodes {
        languageCode
        description
      }
    }
    fiatOrdersByAccountId(orderBy: CREATED_AT_DESC) {
      nodes {
        createdAt
        txHash
        stripePaymentIntentId
        retiredCredits
        totalPrice
        askDenom
        creditsAmount
        projectOnChainId
        customerName
        anonymous
      }
    }
    daosByAssignmentAccountIdAndDaoAddress {
      nodes {
        address
        daoRbamAddress
        cw4GroupAddress
        canUseStripeConnect
        stripeConnectedAccountId
        organizationByDaoAddress {
          id
          name
          description
          image
          bgImage
          websiteLink
          twitterLink
        }
        projectByAdminDaoAddress {
          onChainId
          id
        }
      }
    }
  }
}

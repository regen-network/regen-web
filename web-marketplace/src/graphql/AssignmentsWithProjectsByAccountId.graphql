query AssignmentsWithProjectsByAccountId($id: UUID!) {
  accountById(id: $id) {
    assignmentsByAccountId {
      nodes {
        roleName
        onChainRoleId
        daoByDaoAddress {
          address
          projectByAdminDaoAddress {
            ...projectFields
            organizationProjectByProjectId {
              organizationId
            }
          }
        }
      }
    }
  }
}

query AccountByAddr($addr: String!) {
  accountByAddr(addr: $addr) {
    id
    addr
    name
    type
    image
    bgImage
    description
    websiteLink
    twitterLink
    stripeConnectedAccountId
    accountTranslationsById {
      nodes {
        languageCode
        description
      }
    }
    daosByAssignmentAccountIdAndDaoAddress {
      nodes {
        address
        daoRbamAddress
        cw4GroupAddress
        canUseStripeConnect
        stripeConnectedAccountId
        organizationByDaoAddress {
          id
          name
          description
          image
          bgImage
          websiteLink
          twitterLink
        }
        projectByAdminDaoAddress {
          onChainId
          id
        }
      }
    }
  }
}
